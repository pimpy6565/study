<!DOCTYPE html>
<html>
    <head>
        
            <title>{% block title %}{% endblock %}</title>


            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>Practice Quizzes - Grades 1–5</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
            <style>
              body {
                background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
                min-height: 100vh;
                font-family: system-ui, -apple-system, sans-serif;
              }
              .card {
                border: none;
                border-radius: 1.25rem;
                box-shadow: 0 10px 40px rgba(0,0,0,0.08);
              }
              .grade-btn, .subject-btn {
                font-size: 1.3rem;
                padding: 1.3rem 2rem;
                margin: 0.6rem;
                min-width: 140px;
                transition: all 0.25s ease;
              }
              .grade-btn:hover, .subject-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 12px 24px rgba(0,0,0,0.1);
              }
              .option-label {
                font-size: 1.1rem;
                padding: 0.9rem 1.2rem;
                border-radius: 0.75rem;
                cursor: pointer;
                transition: background 0.2s;
              }
              .option-label:hover { background: #e6f0ff; }
              .correct   { background: #e6ffe6 !important; border: 2px solid #28a745; }
              .incorrect { background: #ffe6e6 !important; border: 2px solid #dc3545; }
              #loading-overlay {
                position: absolute; inset: 0; background: rgba(255,255,255,0.85);
                display: flex; align-items: center; justify-content: center; z-index: 20;
                border-radius: 1.25rem; opacity: 0; pointer-events: none; transition: opacity 0.4s;
              }
              #loading-overlay.active { opacity: 1; pointer-events: auto; }
              .question-card { min-height: 240px; }
              @media (max-width: 576px) {
                .grade-btn, .subject-btn { min-width: 120px; font-size: 1.1rem; padding: 1rem 1.5rem; }
              }
            </style>            
    </head>
    <body>
        {% block body %}
        {% endblock %}
    </body>
</html>
